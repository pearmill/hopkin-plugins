name: Detect and Release Skills

on:
  push:
    branches:
      - main
    paths:
      - '*/skills/**/SKILL.md'
      - '*/skills/**/references/**'
      - '*/.claude-plugin/**'
      - '*/.mcp.json'
  workflow_dispatch:
    inputs:
      skill_name:
        description: 'Skill name to release (optional, leave empty to auto-detect)'
        required: false
        type: string

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.detect.outputs.skills }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed skills
        id: detect
        run: |
          set -e

          # Manual trigger with specific skill
          if [ -n "${{ github.event.inputs.skill_name }}" ]; then
            SKILL="${{ github.event.inputs.skill_name }}"
            if [ -f "$SKILL/skills/$SKILL/SKILL.md" ]; then
              echo "skills=[\"$SKILL\"]" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "Manual trigger for skill: $SKILL"
              exit 0
            else
              echo "Error: Skill '$SKILL' not found or missing skills/$SKILL/SKILL.md"
              echo "skills=[]" >> $GITHUB_OUTPUT
              echo "has_changes=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

          # Auto-detect changed skills from push
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"

            # Get changed files
            CHANGED_FILES=$(git diff --name-only $BEFORE..$AFTER)
            echo "Changed files:"
            echo "$CHANGED_FILES"

            # Extract skill directories (plugin structure: skills/, .claude-plugin/, .mcp.json)
            SKILLS=$(echo "$CHANGED_FILES" | grep -E '^[^/]+/(skills/|\.claude-plugin/|\.mcp\.json)' | cut -d'/' -f1 | sort -u)

            if [ -z "$SKILLS" ]; then
              echo "No skill changes detected"
              echo "skills=[]" >> $GITHUB_OUTPUT
              echo "has_changes=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Verify SKILL.md exists for each detected skill (plugin structure)
            VALID_SKILLS=""
            for SKILL in $SKILLS; do
              if [ -f "$SKILL/skills/$SKILL/SKILL.md" ]; then
                VALID_SKILLS="$VALID_SKILLS $SKILL"
              fi
            done

            if [ -z "$VALID_SKILLS" ]; then
              echo "No valid skills with SKILL.md found"
              echo "skills=[]" >> $GITHUB_OUTPUT
              echo "has_changes=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Convert to JSON array
            JSON_SKILLS=$(echo $VALID_SKILLS | tr ' ' '\n' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "Detected skills: $JSON_SKILLS"
            echo "skills=$JSON_SKILLS" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  release-skill:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.detect-changes.outputs.skills) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read and bump version
        id: version
        run: |
          set -e
          SKILL="${{ matrix.skill }}"
          VERSION_FILE="$SKILL/.version"

          # Read current version or default to 1.0.0
          if [ -f "$VERSION_FILE" ]; then
            CURRENT_VERSION=$(cat "$VERSION_FILE")
            echo "Current version: $CURRENT_VERSION"
          else
            CURRENT_VERSION="1.0.0"
            echo "No version file found, starting with: $CURRENT_VERSION"
          fi

          # Bump minor version (X.Y.Z -> X.Y+1.0)
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

          # Increment minor version and reset patch to 0
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"

          echo "New version: $NEW_VERSION"
          echo "$NEW_VERSION" > "$VERSION_FILE"

          # Output for next steps
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$SKILL-v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "previous_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Update plugin.json version
        run: |
          set -e
          SKILL="${{ matrix.skill }}"
          VERSION="${{ steps.version.outputs.version }}"
          PLUGIN_JSON="$SKILL/.claude-plugin/plugin.json"
          if [ -f "$PLUGIN_JSON" ]; then
            jq --arg v "$VERSION" '.version = $v' "$PLUGIN_JSON" > tmp.json && mv tmp.json "$PLUGIN_JSON"
            echo "Updated $PLUGIN_JSON to version $VERSION"
          fi

      - name: Check if release exists
        id: check_release
        run: |
          set -e
          TAG="${{ steps.version.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists - skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist - proceeding with release"
          fi

      - name: Find last release tag
        if: steps.check_release.outputs.exists == 'false'
        id: last_tag
        run: |
          set -e
          SKILL="${{ matrix.skill }}"

          # Find the last tag for this skill
          LAST_TAG=$(git tag -l "$SKILL-v*" | sort -V | tail -1 || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "No previous release found - this is the initial release"
            echo "tag=" >> $GITHUB_OUTPUT
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "Last release tag: $LAST_TAG"
            echo "tag=$LAST_TAG" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        if: steps.check_release.outputs.exists == 'false'
        id: changelog
        run: |
          set -e
          SKILL="${{ matrix.skill }}"
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"

          echo "## Changes" > changelog.md
          echo "" >> changelog.md

          if [ "${{ steps.last_tag.outputs.found }}" = "true" ]; then
            # Get commits since last tag
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$LAST_TAG..HEAD" -- "$SKILL/")

            if [ -z "$COMMITS" ]; then
              echo "- No commit history available" >> changelog.md
            else
              echo "$COMMITS" >> changelog.md
            fi
          else
            # Initial release - get all commits for this skill
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD -- "$SKILL/")

            if [ -z "$COMMITS" ]; then
              echo "- Initial release of $SKILL skill" >> changelog.md
            else
              echo "- Initial release" >> changelog.md
              echo "" >> changelog.md
              echo "### Commit History" >> changelog.md
              echo "$COMMITS" >> changelog.md
            fi
          fi

          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "📦 Download the skill package from the assets below" >> changelog.md

          cat changelog.md

          # Store changelog for later steps
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Package plugin
        if: steps.check_release.outputs.exists == 'false'
        run: |
          set -e
          SKILL="${{ matrix.skill }}"
          VERSION="${{ steps.version.outputs.version }}"

          chmod +x package-plugin.sh
          ./package-plugin.sh "$SKILL" "$VERSION"

          # Verify the package was created (note: package-skill.sh adds 'v' prefix)
          PACKAGE_FILE="releases/${SKILL}-v${VERSION}.zip"
          if [ ! -f "$PACKAGE_FILE" ]; then
            echo "Error: Package file not created at $PACKAGE_FILE"
            exit 1
          fi

          echo "Package created: $PACKAGE_FILE"
          ls -lh "$PACKAGE_FILE"

      - name: Setup Node.js
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upload to Vercel Blob
        if: steps.check_release.outputs.exists == 'false'
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          SKILL: ${{ matrix.skill }}
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE_FILE: releases/${{ matrix.skill }}-v${{ steps.version.outputs.version }}.zip
        run: |
          set -e

          npm install @vercel/blob

          node -e "
            const { put } = require('@vercel/blob');
            const fs = require('fs');

            async function upload() {
              const skill = process.env.SKILL;
              const version = process.env.VERSION;
              const file = fs.readFileSync(process.env.PACKAGE_FILE);

              // Upload as latest
              const latest = await put('skills/' + skill + '/latest.zip', file, {
                access: 'public',
                addRandomSuffix: false,
              });
              console.log('Uploaded latest:', latest.url);

              // Upload versioned copy
              const versioned = await put('skills/' + skill + '/v' + version + '.zip', file, {
                access: 'public',
                addRandomSuffix: false,
              });
              console.log('Uploaded versioned:', versioned.url);
            }

            upload().catch(err => { console.error(err); process.exit(1); });
          "

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ matrix.skill }} v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: releases/${{ matrix.skill }}-v${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push version file
        if: steps.check_release.outputs.exists == 'false'
        run: |
          set -e
          SKILL="${{ matrix.skill }}"
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_FILE="$SKILL/.version"

          # Add and commit the version and plugin.json files
          git add "$VERSION_FILE"
          git add "$SKILL/.claude-plugin/plugin.json"
          git commit -m "chore: bump $SKILL version to $VERSION [skip ci]"

          # Push with retry logic to handle concurrent releases
          MAX_RETRIES=5
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            # Pull latest changes (rebase to avoid merge commits)
            git pull --rebase origin main || true

            # Try to push
            if git push origin main; then
              echo "Version file committed and pushed successfully"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Push failed, retrying in 2 seconds... (attempt $RETRY_COUNT/$MAX_RETRIES)"
                sleep 2
              else
                echo "Failed to push after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done

      - name: Upload to Notion
        if: steps.check_release.outputs.exists == 'false'
        run: |
          set -e
          SKILL="${{ matrix.skill }}"
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$TAG"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/${SKILL}-v${VERSION}.zip"
          RELEASE_DATE=$(date -u +"%Y-%m-%d")

          # Format skill name (capitalize and replace hyphens with spaces)
          SKILL_NAME=$(echo "$SKILL" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')

          # Store and trim API key to handle potential whitespace/newline issues
          # Remove leading/trailing whitespace and newlines
          NOTION_API_KEY=$(echo "${{ secrets.NOTION_API_KEY }}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | tr -d '\n\r')
          
          # Verify API key is set (without exposing it)
          if [ -z "$NOTION_API_KEY" ]; then
            echo "Error: NOTION_API_KEY secret is not set or is empty"
            exit 1
          fi
          echo "Notion API key is set (length: ${#NOTION_API_KEY} characters)"

          # Build Notion page payload using jq for proper JSON escaping
          NOTION_PAYLOAD=$(jq -n \
            --arg skill_name "$SKILL_NAME" \
            --arg version "$VERSION" \
            --arg release_date "$RELEASE_DATE" \
            --arg release_url "$RELEASE_URL" \
            --arg download_url "$DOWNLOAD_URL" \
            --arg changelog "${{ steps.changelog.outputs.changelog }}" \
            '{
              "parent": { "database_id": "2efade1c60188049a0f8ea158d9313c5" },
              "properties": {
                "Skill Name": {
                  "title": [
                    {
                      "text": {
                        "content": $skill_name
                      }
                    }
                  ]
                },
                "Version": {
                  "rich_text": [
                    {
                      "text": {
                        "content": $version
                      }
                    }
                  ]
                },
                "Release Date": {
                  "date": {
                    "start": $release_date
                  }
                },
                "GitHub URL": {
                  "url": $release_url
                },
                "Download URL": {
                  "url": $download_url
                },
                "Changelog": {
                  "rich_text": [
                    {
                      "text": {
                        "content": $changelog
                      }
                    }
                  ]
                }
              }
            }')

          # Create Notion page
          HTTP_CODE=$(curl -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -w "%{http_code}" \
            -o /tmp/notion_response.json \
            -s \
            -d "$NOTION_PAYLOAD" || echo "000")

          # Check if curl command failed or returned non-2xx status code
          if [ "$HTTP_CODE" = "000" ]; then
            echo "Error: curl request failed"
            exit 1
          fi

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Error: Notion API returned HTTP $HTTP_CODE"
            echo "Response body:"
            cat /tmp/notion_response.json
            exit 1
          fi

          echo "Uploaded to Notion database"

      - name: Send Slack notification
        if: steps.check_release.outputs.exists == 'false'
        continue-on-error: true
        run: |
          set -e
          SKILL="${{ matrix.skill }}"
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$TAG"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/${SKILL}-v${VERSION}.zip"

          # Format skill name
          SKILL_NAME=$(echo "$SKILL" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')

          # Format changelog for Slack (extract first 500 chars)
          CHANGELOG_PREVIEW=$(echo "${{ steps.changelog.outputs.changelog }}" | head -c 500)

          # Build Slack message payload using jq for proper JSON escaping
          SLACK_PAYLOAD=$(jq -n \
            --arg skill_name "$SKILL_NAME" \
            --arg version "$VERSION" \
            --arg download_url "$DOWNLOAD_URL" \
            --arg release_url "$RELEASE_URL" \
            --arg changelog "$CHANGELOG_PREVIEW" \
            '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ("🚀 New Skill Release: " + $skill_name),
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": ("*Version:*\n" + $version)
                    },
                    {
                      "type": "mrkdwn",
                      "text": ("*Skill:*\n" + $skill_name)
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ("*📥 Download:*\n<" + $download_url + "|Download ZIP>")
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ("*🔗 Links:*\n<" + $release_url + "|GitHub Release> | <https://notion.so/2efade1c60188049a0f8ea158d9313c5|Notion Database>")
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ("*📝 Changelog:*\n```" + $changelog + "```")
                  }
                }
              ]
            }')

          # Send Slack message
          HTTP_CODE=$(curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -w "%{http_code}" \
            -o /tmp/slack_response.json \
            -s \
            -d "$SLACK_PAYLOAD" || echo "000")

          # Check if curl command failed or returned non-2xx status code
          if [ "$HTTP_CODE" = "000" ]; then
            echo "Error: curl request failed"
            exit 1
          fi

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Error: Slack webhook returned HTTP $HTTP_CODE"
            echo "Response body:"
            cat /tmp/slack_response.json
            exit 1
          fi

          echo "Slack notification sent"

  update-marketplace:
    needs: [detect-changes, release-skill]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync marketplace versions
        run: |
          set -e
          MARKETPLACE_JSON=".claude-plugin/marketplace.json"
          if [ ! -f "$MARKETPLACE_JSON" ]; then
            echo "No marketplace.json found, skipping"
            exit 0
          fi

          UPDATED=false
          for PLUGIN_DIR in */; do
            PLUGIN="${PLUGIN_DIR%/}"
            VERSION_FILE="$PLUGIN/.version"
            if [ -f "$VERSION_FILE" ] && [ -f "$PLUGIN/.claude-plugin/plugin.json" ]; then
              VERSION=$(cat "$VERSION_FILE")
              CURRENT=$(jq -r --arg name "$PLUGIN" '.plugins[] | select(.name == $name) | .version' "$MARKETPLACE_JSON")
              if [ "$CURRENT" != "$VERSION" ]; then
                jq --arg name "$PLUGIN" --arg v "$VERSION" \
                  '(.plugins[] | select(.name == $name)).version = $v' \
                  "$MARKETPLACE_JSON" > tmp.json && mv tmp.json "$MARKETPLACE_JSON"
                echo "Updated $PLUGIN in marketplace.json to $VERSION"
                UPDATED=true
              fi
            fi
          done

          if [ "$UPDATED" = "true" ]; then
            git add "$MARKETPLACE_JSON"
            git commit -m "chore: sync marketplace.json versions [skip ci]"

            MAX_RETRIES=5
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              git pull --rebase origin main || true
              if git push origin main; then
                echo "Marketplace versions synced successfully"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "Push failed, retrying in 2 seconds... (attempt $RETRY_COUNT/$MAX_RETRIES)"
                  sleep 2
                else
                  echo "Failed to push after $MAX_RETRIES attempts"
                  exit 1
                fi
              fi
            done
          else
            echo "Marketplace versions already up to date"
          fi
