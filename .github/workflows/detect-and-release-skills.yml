name: Detect and Release Skills

on:
  push:
    branches:
      - main
    paths:
      - 'hopkin/skills/**'
      - 'hopkin/.claude-plugin/**'
      - 'hopkin/.mcp.json'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read and bump version
        id: version
        run: |
          set -e
          VERSION_FILE="hopkin/.version"

          if [ -f "$VERSION_FILE" ]; then
            CURRENT_VERSION=$(cat "$VERSION_FILE")
            echo "Current version: $CURRENT_VERSION"
          else
            CURRENT_VERSION="1.0.0"
            echo "No version file found, starting with: $CURRENT_VERSION"
          fi

          # Bump minor version (X.Y.Z -> X.Y+1.0)
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)

          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"

          echo "New version: $NEW_VERSION"
          echo "$NEW_VERSION" > "$VERSION_FILE"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=hopkin-v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "previous_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Update plugin.json version
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          PLUGIN_JSON="hopkin/.claude-plugin/plugin.json"
          if [ -f "$PLUGIN_JSON" ]; then
            jq --arg v "$VERSION" '.version = $v' "$PLUGIN_JSON" > tmp.json && mv tmp.json "$PLUGIN_JSON"
            echo "Updated $PLUGIN_JSON to version $VERSION"
          fi

      - name: Check if release exists
        id: check_release
        run: |
          set -e
          TAG="${{ steps.version.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists - skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist - proceeding with release"
          fi

      - name: Find last release tag
        if: steps.check_release.outputs.exists == 'false'
        id: last_tag
        run: |
          set -e
          LAST_TAG=$(git tag -l "hopkin-v*" | sort -V | tail -1 || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "No previous release found - this is the initial release"
            echo "tag=" >> $GITHUB_OUTPUT
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "Last release tag: $LAST_TAG"
            echo "tag=$LAST_TAG" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        if: steps.check_release.outputs.exists == 'false'
        id: changelog
        run: |
          set -e
          LAST_TAG="${{ steps.last_tag.outputs.tag }}"

          echo "## Changes" > changelog.md
          echo "" >> changelog.md

          if [ "${{ steps.last_tag.outputs.found }}" = "true" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$LAST_TAG..HEAD" -- "hopkin/")

            if [ -z "$COMMITS" ]; then
              echo "- No commit history available" >> changelog.md
            else
              echo "$COMMITS" >> changelog.md
            fi
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD -- "hopkin/")

            if [ -z "$COMMITS" ]; then
              echo "- Initial release of hopkin plugin" >> changelog.md
            else
              echo "- Initial release" >> changelog.md
              echo "" >> changelog.md
              echo "### Commit History" >> changelog.md
              echo "$COMMITS" >> changelog.md
            fi
          fi

          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "📦 Download the skill package from the assets below" >> changelog.md

          cat changelog.md

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Package plugin
        if: steps.check_release.outputs.exists == 'false'
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p releases

          TEMP_DIR=$(mktemp -d)
          cp -R "hopkin" "$TEMP_DIR/hopkin"

          find "$TEMP_DIR/hopkin" -name ".DS_Store" -delete

          cd "$TEMP_DIR"
          zip -r -q "hopkin.zip" "hopkin"
          cd - > /dev/null

          mv "$TEMP_DIR/hopkin.zip" "releases/hopkin-v${VERSION}.zip"
          rm -rf "$TEMP_DIR"

          PACKAGE_FILE="releases/hopkin-v${VERSION}.zip"
          if [ ! -f "$PACKAGE_FILE" ]; then
            echo "Error: Package file not created at $PACKAGE_FILE"
            exit 1
          fi

          echo "Package created: $PACKAGE_FILE"
          ls -lh "$PACKAGE_FILE"

      - name: Setup Node.js
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upload to Vercel Blob
        if: steps.check_release.outputs.exists == 'false'
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE_FILE: releases/hopkin-v${{ steps.version.outputs.version }}.zip
        run: |
          set -e

          npm install @vercel/blob

          node -e "
            const { put } = require('@vercel/blob');
            const fs = require('fs');

            async function upload() {
              const version = process.env.VERSION;
              const file = fs.readFileSync(process.env.PACKAGE_FILE);

              // Upload as latest
              const latest = await put('skills/hopkin/latest.zip', file, {
                access: 'public',
                addRandomSuffix: false,
                allowOverwrite: true,
              });
              console.log('Uploaded latest:', latest.url);

              // Upload versioned copy
              const versioned = await put('skills/hopkin/v' + version + '.zip', file, {
                access: 'public',
                addRandomSuffix: false,
                allowOverwrite: true,
              });
              console.log('Uploaded versioned:', versioned.url);
            }

            upload().catch(err => { console.error(err); process.exit(1); });
          "

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: hopkin v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: releases/hopkin-v${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push version file
        if: steps.check_release.outputs.exists == 'false'
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"

          git add "hopkin/.version"
          git add "hopkin/.claude-plugin/plugin.json"
          git commit -m "chore: bump hopkin version to $VERSION [skip ci]"

          MAX_RETRIES=5
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            git pull --rebase origin main || true

            if git push origin main; then
              echo "Version file committed and pushed successfully"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Push failed, retrying in 2 seconds... (attempt $RETRY_COUNT/$MAX_RETRIES)"
                sleep 2
              else
                echo "Failed to push after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done

  update-marketplace:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync marketplace versions
        run: |
          set -e
          MARKETPLACE_JSON=".claude-plugin/marketplace.json"
          if [ ! -f "$MARKETPLACE_JSON" ]; then
            echo "No marketplace.json found, skipping"
            exit 0
          fi

          VERSION_FILE="hopkin/.version"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "No version file found, skipping"
            exit 0
          fi

          VERSION=$(cat "$VERSION_FILE")
          CURRENT=$(jq -r '.plugins[] | select(.name == "hopkin") | .version' "$MARKETPLACE_JSON")

          if [ "$CURRENT" != "$VERSION" ]; then
            jq --arg v "$VERSION" \
              '(.plugins[] | select(.name == "hopkin")).version = $v' \
              "$MARKETPLACE_JSON" > tmp.json && mv tmp.json "$MARKETPLACE_JSON"
            echo "Updated hopkin in marketplace.json to $VERSION"

            git add "$MARKETPLACE_JSON"
            git commit -m "chore: sync marketplace.json versions [skip ci]"

            MAX_RETRIES=5
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              git pull --rebase origin main || true
              if git push origin main; then
                echo "Marketplace versions synced successfully"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "Push failed, retrying in 2 seconds... (attempt $RETRY_COUNT/$MAX_RETRIES)"
                  sleep 2
                else
                  echo "Failed to push after $MAX_RETRIES attempts"
                  exit 1
                fi
              fi
            done
          else
            echo "Marketplace version already up to date"
          fi
